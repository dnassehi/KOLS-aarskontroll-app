services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kols}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kols_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kols_app}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - kols_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kols} -d ${POSTGRES_DB:-kols_app}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: ./web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kols}:${POSTGRES_PASSWORD:-kols_dev_password}@db:5432/${POSTGRES_DB:-kols_app}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-now}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3011:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  kols_db_data:
